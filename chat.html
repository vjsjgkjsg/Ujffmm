<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b1120;--bg2:#111827;--bg3:#1a2235;
  --card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --text:#e8edf8;--text2:rgba(255,255,255,0.5);--text3:rgba(255,255,255,0.25);
  --accent:#1976d2;--accent2:rgba(25,118,210,0.15);--radius:14px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{height:54px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
  position:relative;z-index:10}
.tb-back{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;padding:4px 8px;border-radius:8px;transition:all .2s}
.tb-back:hover{background:var(--bg3);color:var(--text)}
.tb-title{font-weight:800;font-size:16px;flex:1}
.tb-sub{font-size:12px;color:var(--text2)}
.tb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1976d2,#7c3aed);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-search{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;
  padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:all .2s}
.sb-search:focus{border-color:var(--accent);background:var(--accent2)}
.sb-search::placeholder{color:var(--text3)}
.btn-new{background:var(--accent);border:none;color:#fff;width:36px;height:36px;border-radius:10px;
  cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s}
.btn-new:hover{background:#1565c0;transform:scale(1.05)}
.conv-list{flex:1;overflow-y:auto}
.conv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.03);transition:background .15s;position:relative}
.conv-item:hover{background:rgba(255,255,255,0.03)}
.conv-item.active{background:var(--accent2);border-right:3px solid var(--accent)}
.ci-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1976d2,#7c3aed);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;
  flex-shrink:0;position:relative}
.ci-av.group{background:linear-gradient(135deg,#059669,#0891b2);font-size:20px}
.ci-info{flex:1;min-width:0}
.ci-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-last{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ci-time{font-size:11px;color:var(--text3)}
.ci-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:800;
  min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}

/* ── ЧАТА ОБЛАСТЬ ── */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.ch-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1976d2,#7c3aed);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.ch-av.group{background:linear-gradient(135deg,#059669,#0891b2);font-size:18px}
.ch-info{flex:1}
.ch-name{font-weight:800;font-size:15px}
.ch-sub{font-size:12px;color:var(--text2);margin-top:1px}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg-row{display:flex;gap:8px;align-items:flex-end}
.msg-row.mine{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#059669,#0891b2);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;
  flex-shrink:0;margin-bottom:2px}
.msg-bubble{max-width:70%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.msg-row.mine .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg-row.other .msg-bubble{background:var(--bg3);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.msg-name{font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600}
.msg-time{font-size:10px;opacity:.6;margin-top:4px;text-align:right}
.msg-row.other .msg-time{text-align:left}
.date-sep{text-align:center;font-size:11px;color:var(--text3);margin:8px 0;
  display:flex;align-items:center;gap:8px}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── ВВОД ── */
.input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.msg-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;
  resize:none;max-height:120px;line-height:1.4;transition:border-color .2s}
.msg-input:focus{border-color:var(--accent)}
.msg-input::placeholder{color:var(--text3)}
.btn-send{background:var(--accent);border:none;color:#fff;width:40px;height:40px;border-radius:12px;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s}
.btn-send:hover{background:#1565c0;transform:scale(1.05)}
.btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── ПУСТОЙ ЧАТ ── */
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text3);text-align:center;padding:40px}
.empty-chat-icon{font-size:56px;margin-bottom:16px;opacity:.5}
.empty-chat-title{font-size:18px;font-weight:700;margin-bottom:6px}
.empty-chat-sub{font-size:13px}

/* ── МОДАЛ НОВЫЙ Чात ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;
  width:100%;max-width:440px;overflow:hidden;animation:slideUp .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:800;font-size:16px}
.modal-body{padding:20px}
.modal-tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:10px;padding:3px;margin-bottom:16px;gap:3px}
.modal-tab{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-size:13px;
  font-weight:700;cursor:pointer;border-radius:8px;transition:all .2s;font-family:inherit}
.modal-tab.active{background:var(--accent);color:#fff}
.user-pick{max-height:220px;overflow-y:auto}
.user-pick-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:background .15s}
.user-pick-item:hover{background:rgba(255,255,255,0.05)}
.user-pick-item.selected{background:var(--accent2);border:1px solid rgba(25,118,210,0.3)}
.up-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1976d2,#7c3aed);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.up-name{font-weight:600;font-size:14px}
.up-check{margin-left:auto;font-size:18px;opacity:0;transition:opacity .15s}
.user-pick-item.selected .up-check{opacity:1}
.group-name-field{margin-top:12px;display:none}
.group-name-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none}
.group-name-input:focus{border-color:var(--accent)}
.btn-create{width:100%;margin-top:14px;padding:12px;background:var(--accent);color:#fff;
  border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-create:hover{background:#1565c0}
.btn-create:disabled{opacity:.5;cursor:not-allowed}
.btn-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;padding:4px}

/* ── МОБАЙЛ ── */
@media(max-width:700px){
  .sidebar{width:100%;display:flex}
  .sidebar.hidden{display:none}
  .chat-area{display:none}
  .chat-area.active{display:flex}
}

/* ── СКРОЛЛБАР ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

    @media (max-width: 480px) {
      .topbar { padding: 0 12px; }
      .tb-title { font-size: 14px; }
      .sb-search { font-size: 16px; }
      .msg-input { font-size: 16px; }
      .msg-bubble { max-width: 85%; }
    }
</style>

<body>

<!-- TOPBAR -->

<!-- МОДАЛ НОВЫЙ ЧАТ -->

        Создать чат
      </button>

  </div>
</div>

<script>
/* ══ CONFIG ══ */
const SB_URL  = 'https://ljtogliylpubvkckpwyv.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqdG9nbGl5bHB1YnZrY2twd3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzEzODQsImV4cCI6MjA4ODc0NzM4NH0.91EQ_EEfi8X09Vm0jmH12_35R6tf0BwtTGoX3K5lgfc';

let me = null;
let activeConvId = null;
let allConvs = [];
let pollTimer = null;
let lastMsgTime = null;
let newType = 'direct';
let selectedUsers = [];

/* ══ INIT ══ */
window.addEventListener('DOMContentLoaded', async () => {
  const raw = sessionStorage.getItem('psess_user') || localStorage.getItem('psess_user');
  if (!raw) { window.location.href='./auth.html'; return; }
  // Синхронизируем оба хранилища
  sessionStorage.setItem('psess_user', raw);
  localStorage.setItem('psess_user', raw);
  me = JSON.parse(raw);
  document.getElementById('my-av').textContent = (me.name||'?')[0].toUpperCase();
  await loadConvs();
  startPoll();
});

/* ══ SUPABASE ══ */
async function sb(path, opts={}) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), 8000);
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SB_ANON, 'Authorization': 'Bearer '+SB_ANON,
        'Content-Type': 'application/json',
        'Prefer': opts.prefer || (opts.method==='POST' ? 'return=representation' : 'return=minimal'),
        ...(opts.headers||{})
      },
      signal: ctrl.signal, ...opts
    });
    clearTimeout(tid);
    if (opts.method==='DELETE') return true;
    const data = await r.json();
    if (!r.ok) throw new Error(data.message||r.statusText);
    return data;
  } catch(e) { clearTimeout(tid); throw e; }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ══ ЗАГРУЗКА ДИАЛОГОВ ══ */
async function loadConvs() {
  try {
    // Берём все участия этого пользователя
    const parts = await sb(`chat_participants?user_id=eq.${encodeURIComponent(me.id)}&select=conversation_id`);
    if (!parts || !parts.length) { renderConvList([]); return; }

    const ids = parts.map(p => p.conversation_id);
    // Загружаем диалоги
    const convs = await sb(`chat_conversations?id=in.(${ids.map(id=>encodeURIComponent(id)).join(',')})&select=*&order=created_at.desc`);

    // Для каждого — последнее сообщение
    const convsWithLast = await Promise.all((convs||[]).map(async conv => {
      try {
        const msgs = await sb(`chat_messages_v2?conversation_id=eq.${encodeURIComponent(conv.id)}&select=text,user_name,created_at&order=created_at.desc&limit=1`);
        const last = msgs?.[0] || null;
        // Имя собеседника для личных чатов
        let displayName = conv.name;
        if (conv.type === 'direct') {
          const otherParts = await sb(`chat_participants?conversation_id=eq.${encodeURIComponent(conv.id)}&user_id=neq.${encodeURIComponent(me.id)}&select=user_name`);
          displayName = otherParts?.[0]?.user_name || conv.name || 'Диалог';
        }
        return { ...conv, displayName, lastMsg: last };
      } catch(e) { return { ...conv, displayName: conv.name||'Диалог', lastMsg: null }; }
    }));

    allConvs = convsWithLast;
    renderConvList(convsWithLast);
  } catch(e) {
    document.getElementById('conv-list').innerHTML =
      `<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.3);font-size:13px">Ошибка загрузки</div>`;
  }
}

function renderConvList(convs) {
  const el = document.getElementById('conv-list');
  if (!convs.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text3)">
      <div style="font-size:36px;margin-bottom:10px">💬</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">Чатов нет</div>
      <div style="font-size:12px">Нажмите + чтобы начать</div></div>`;
    return;
  }
  el.innerHTML = convs.map(conv => {
    const isGroup = conv.type === 'group';
    const icon = isGroup ? '👥' : (conv.displayName||'?')[0].toUpperCase();
    const avClass = isGroup ? 'ci-av group' : 'ci-av';
    const lastText = conv.lastMsg
      ? (conv.lastMsg.user_name === me.name ? 'Вы: ' : '') + conv.lastMsg.text
      : 'Нет сообщений';
    const lastTime = conv.lastMsg
      ? fmtTime(new Date(conv.lastMsg.created_at)) : '';
    const active = conv.id === activeConvId ? ' active' : '';
    return `<div class="conv-item${active}" onclick="openConv('${conv.id}')">
      <div class="${avClass}">${icon}</div>
      <div class="ci-info">
        <div class="ci-name">${esc(conv.displayName||conv.name||'Диалог')}</div>
        <div class="ci-last">${esc(lastText)}</div>
      </div>
      <div class="ci-meta"><span class="ci-time">${lastTime}</span></div>
    </div>`;
  }).join('');
}

function filterConvs(q) {
  q = q.toLowerCase().trim();
  if (!q) { renderConvList(allConvs); return; }
  renderConvList(allConvs.filter(c =>
    (c.displayName||'').toLowerCase().includes(q) ||
    (c.lastMsg?.text||'').toLowerCase().includes(q)
  ));
}

/* ══ ОТКРЫТЬ ДИАЛОГ ══ */
async function openConv(id) {
  activeConvId = id;
  const conv = allConvs.find(c => c.id === id);
  if (!conv) return;

  // Обновляем список
  renderConvList(allConvs);

  // Показываем чат
  document.getElementById('empty-chat').style.display = 'none';
  const ac = document.getElementById('active-chat');
  ac.style.display = 'flex';

  // Заголовок
  const isGroup = conv.type === 'group';
  const avEl = document.getElementById('ch-av');
  avEl.className = isGroup ? 'ch-av group' : 'ch-av';
  avEl.textContent = isGroup ? '👥' : (conv.displayName||'?')[0].toUpperCase();
  document.getElementById('ch-name').textContent = conv.displayName || conv.name || 'Диалог';
  document.getElementById('ch-sub').textContent  = isGroup ? 'Групповой чат' : 'Личный диалог';

  // Мобайл
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('chat-area').classList.add('active');

  // Загружаем сообщения
  await loadMessages(id);
  document.getElementById('msg-input').focus();
}

/* ══ СООБЩЕНИЯ ══ */
async function loadMessages(convId) {
  const el = document.getElementById('messages');
  try {
    const msgs = await sb(
      `chat_messages_v2?conversation_id=eq.${encodeURIComponent(convId)}&select=*&order=created_at.asc&limit=100`
    );
    lastMsgTime = msgs?.length ? msgs[msgs.length-1].created_at : null;
    renderMessages(msgs||[]);
    scrollToBottom();
  } catch(e) {}
}

function renderMessages(msgs) {
  const el = document.getElementById('messages');
  if (!msgs.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">
      Начните общение!</div>`;
    return;
  }
  let html = '';
  let lastDate = '';
  msgs.forEach(msg => {
    const d = new Date(msg.created_at);
    const dateStr = d.toLocaleDateString('ru-RU', {day:'numeric',month:'long'});
    if (dateStr !== lastDate) {
      html += `<div class="date-sep">${dateStr}</div>`;
      lastDate = dateStr;
    }
    const isMine = msg.user_id === me.id;
    const av = (msg.user_name||'?')[0].toUpperCase();
    html += `<div class="msg-row ${isMine?'mine':'other'}">
      ${!isMine ? `<div class="msg-av">${esc(av)}</div>` : ''}
      <div>
        ${!isMine ? `<div class="msg-name">${esc(msg.user_name)}</div>` : ''}
        <div class="msg-bubble">${esc(msg.text).replace(/\n/g,'<br>')}
          <div class="msg-time">${fmtTimeFull(d)}</div>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

/* ══ ОТПРАВИТЬ ══ */
async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || !activeConvId) return;

  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  input.value  = '';
  input.style.height = '';

  try {
    await sb('chat_messages_v2', {
      method: 'POST',
      body: JSON.stringify({
        conversation_id: activeConvId,
        user_id:   me.id,
        user_name: me.name,
        text
      })
    });
    await loadMessages(activeConvId);
    await loadConvs();
    scrollToBottom();
  } catch(e) {
    input.value = text; // возвращаем текст при ошибке
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

/* ══ POLLING ══ */
function startPoll() {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (!activeConvId) return;
    try {
      const query = lastMsgTime
        ? `chat_messages_v2?conversation_id=eq.${encodeURIComponent(activeConvId)}&created_at=gt.${encodeURIComponent(lastMsgTime)}&select=*&order=created_at.asc`
        : `chat_messages_v2?conversation_id=eq.${encodeURIComponent(activeConvId)}&select=*&order=created_at.asc&limit=100`;
      const newMsgs = await sb(query);
      if (newMsgs && newMsgs.length) {
        lastMsgTime = newMsgs[newMsgs.length-1].created_at;
        // Добавляем новые сообщения
        const el = document.getElementById('messages');
        const wasBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 50;
        newMsgs.forEach(msg => {
          const isMine = msg.user_id === me.id;
          if (isMine) return; // свои уже добавлены
          const div = document.createElement('div');
          div.className = 'msg-row other';
          div.innerHTML = `<div class="msg-av">${esc((msg.user_name||'?')[0])}</div>
            <div>
              <div class="msg-name">${esc(msg.user_name)}</div>
              <div class="msg-bubble">${esc(msg.text).replace(/\n/g,'<br>')}
                <div class="msg-time">${fmtTimeFull(new Date(msg.created_at))}</div>
              </div>
            </div>`;
          el.appendChild(div);
        });
        if (wasBottom) scrollToBottom();
        // Обновляем список диалогов
        loadConvs();
      }
    } catch(e) {}
  }, 3000);
}

/* ══ НОВЫЙ ЧАТ ══ */
async function showNewModal() {
  selectedUsers = [];
  newType = 'direct';
  document.getElementById('tab-direct').classList.add('active');
  document.getElementById('tab-group').classList.remove('active');
  document.getElementById('group-name-field').style.display = 'none';
  document.getElementById('btn-create').disabled = true;

  // Загружаем пользователей
  const pick = document.getElementById('user-pick');
  pick.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)">Загрузка...</div>';
  document.getElementById('new-modal').style.display = 'flex';

  try {
    const users = await sb(`pedagog_users?id=neq.${encodeURIComponent(me.id)}&select=id,name,role&order=name.asc`);
    pick.innerHTML = (users||[]).map(u => `
      <div class="user-pick-item" id="up-${u.id}" onclick="toggleUser('${u.id}','${esc(u.name)}')">
        <div class="up-av">${(u.name||'?')[0].toUpperCase()}</div>
        <div>
          <div class="up-name">${esc(u.name)}</div>
          <div style="font-size:11px;color:var(--text2)">${u.role}</div>
        </div>
        <span class="up-check">✓</span>
      </div>`).join('') || '<div style="text-align:center;padding:20px;color:var(--text3)">Нет пользователей</div>';
  } catch(e) {
    pick.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)">Ошибка загрузки</div>';
  }
}

function switchNewType(type) {
  newType = type;
  selectedUsers = [];
  document.querySelectorAll('.user-pick-item').forEach(el => el.classList.remove('selected'));
  document.getElementById('tab-direct').classList.toggle('active', type==='direct');
  document.getElementById('tab-group').classList.toggle('active',  type==='group');
  document.getElementById('group-name-field').style.display = type==='group' ? 'block' : 'none';
  document.getElementById('btn-create').disabled = true;
}

function toggleUser(id, name) {
  const el = document.getElementById('up-'+id);
  if (newType === 'direct') {
    // Только один
    document.querySelectorAll('.user-pick-item').forEach(e => e.classList.remove('selected'));
    selectedUsers = [{id, name}];
    el.classList.add('selected');
  } else {
    // Несколько
    const idx = selectedUsers.findIndex(u => u.id === id);
    if (idx > -1) { selectedUsers.splice(idx,1); el.classList.remove('selected'); }
    else          { selectedUsers.push({id,name}); el.classList.add('selected'); }
  }
  document.getElementById('btn-create').disabled = selectedUsers.length === 0;
}

async function createConv() {
  if (!selectedUsers.length) return;
  const btn = document.getElementById('btn-create');
  btn.disabled = true;
  btn.textContent = 'Создание...';

  try {
    let convName = '';
    if (newType === 'group') {
      convName = document.getElementById('group-name').value.trim() ||
        'Группа: ' + [me.name, ...selectedUsers.map(u=>u.name)].join(', ').substring(0,40);
    }

    // Создаём диалог
    const convs = await sb('chat_conversations', {
      method: 'POST',
      body: JSON.stringify({
        type: newType,
        name: convName || null,
        created_by: me.id
      })
    });
    const conv = Array.isArray(convs) ? convs[0] : convs;

    // Добавляем участников
    const participants = [
      { conversation_id: conv.id, user_id: me.id, user_name: me.name },
      ...selectedUsers.map(u => ({ conversation_id: conv.id, user_id: u.id, user_name: u.name }))
    ];
    for (const p of participants) {
      await sb('chat_participants', { method:'POST', body: JSON.stringify(p) });
    }

    closeModal();
    await loadConvs();
    openConv(conv.id);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Создать чат';
    alert('Ошибка: ' + e.message);
  }
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('new-modal'))
    document.getElementById('new-modal').style.display = 'none';
}

/* ══ УТИЛИТЫ ══ */
function goBack() {
  if (window.innerWidth <= 700 && activeConvId) {
    document.getElementById('sidebar').classList.remove('hidden');
    document.getElementById('chat-area').classList.remove('active');
    activeConvId = null;
  } else {
    window.location.href='./index.html';
  }
}

function autoResize(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function msgKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
}

function fmtTime(d) {
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000) return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  if (diff < 604800000) return d.toLocaleDateString('ru-RU',{weekday:'short'});
  return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'});
}

function fmtTimeFull(d) {
  return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}

function toggleTheme() {
  const cur = localStorage.getItem('portal_theme')||'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  localStorage.setItem('portal_theme', next);
  document.documentElement.setAttribute('data-theme', next==='light'?'light':'');
  document.getElementById('theme-btn-chat').textContent = next==='light'?'☀️':'🌙';
}
// Применяем тему при загрузке
(function(){ 
  const t=localStorage.getItem('portal_theme')||'dark';
  if(t==='light') document.documentElement.setAttribute('data-theme','light');
  const btn = document.getElementById('theme-btn-chat');
  if(btn) btn.textContent = t==='light'?'☀️':'🌙';
})();
</script>
